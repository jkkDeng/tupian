<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自适应图片方格画廊</title>
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-main: #050510;
        --bg-gradient: radial-gradient(circle at 50% 50%, #121230, #050510);
        --grid-bg: #101028;
        --grid-border: #2b2b55;
        --accent-color: #8a6dff;
        --shadow-color: #5c44cc;
        --menu-bg: rgba(15, 15, 40, 0.9);
        --text-color: #fff;
        --btn-hover: #6b52e8;
      }

      body.light {
        --bg-main: #f5f7ff;
        --bg-gradient: radial-gradient(circle at 50% 50%, #e8ecff, #f5f7ff);
        --grid-bg: #ffffff;
        --grid-border: #d0d6f0;
        --accent-color: #5c44cc;
        --shadow-color: #8a6dff;
        --menu-bg: rgba(255, 255, 255, 0.9);
        --text-color: #222;
        --btn-hover: #4a34b8;
      }

      body {
        min-height: 100vh;
        background: var(--bg-main);
        background-image: var(--bg-gradient);
        transition: background 0.4s ease;
      }

      /* 自适应网格：固定最小宽度，自动列数 */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 2px;
        width: 100vw;
        min-height: 100vh;
      }

      .grid-item {
        background: var(--grid-bg);
        border: 1px solid var(--grid-border);
        border-radius: 2px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        transform-style: preserve-3d;
        perspective: 800px;
        aspect-ratio: 1 / 1; /* 强制方格为正方形 */
      }

      .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0.85;
        transition: opacity 0.3s ease;
      }

      .grid-item:hover img {
        opacity: 1;
      }

      /* 右侧悬浮菜单 */
      .side-menu-wrap {
        position: fixed;
        top: 50%;
        right: 0;
        transform: translateY(-50%);
        z-index: 999;
      }

      .menu-trigger {
        position: absolute;
        right: 0;
        top: 0;
        width: 10px;
        height: 100vh;
      }

      .side-menu {
        background: var(--menu-bg);
        width: 50px;
        padding: 20px 0;
        border-radius: 6px 0 0 6px;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        gap: 25px;
        align-items: center;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
      }

      .menu-trigger:hover + .side-menu,
      .side-menu:hover {
        transform: translateX(0);
      }

      .menu-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: var(--text-color);
        font-size: 18px;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: all 0.2s ease;
      }

      .menu-btn:hover {
        background: var(--btn-hover);
        color: #fff;
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 18px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="loading">正在加载图片...</div>

    <div class="side-menu-wrap">
      <div class="menu-trigger"></div>
      <div class="side-menu">
        <button class="menu-btn" id="settingBtn" title="设置">
          <i class="fas fa-cog"></i>
        </button>
        <button class="menu-btn" id="modeBtn" title="切换日夜模式">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>

    <div class="grid-container" id="gridBox"></div>

    <script>
      const gridBox = document.getElementById("gridBox");
      const loading = document.querySelector(".loading");
      const imgSuffix = ["jpg", "jpeg", "png", "gif", "webp"];
      const imgList = [];
      let checkIndex = 1;
      let loadComplete = false;

      // 创建方格DOM
      function createItem(src) {
        const item = document.createElement("div");
        item.className = "grid-item";
        const img = document.createElement("img");
        img.src = src;
        img.alt = "图片";
        item.appendChild(img);
        gridBox.appendChild(item);

        // 3D倾斜 + 右下角聚焦凹陷
        item.addEventListener("mousemove", (e) => {
          const rect = item.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const w = rect.width;
          const h = rect.height;

          const rotateX = (y / h - 0.5) * -8;
          const rotateY = (x / w - 0.5) * 8;
          item.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.08) translateZ(-10px)`;
          item.style.boxShadow = `inset -8px -8px 15px rgba(138, 109, 255, 0.4), 0 0 12px var(--accent-color)`;
        });

        item.addEventListener("mouseleave", () => {
          item.style.transform = "rotateX(0) rotateY(0) scale(1) translateZ(0)";
          item.style.boxShadow = "none";
        });

        loading.style.display = "none";
      }

      // 循环探测图片，有则加载，无则停止
      function detectImage(num) {
        let hasImage = false;
        imgSuffix.forEach((suffix) => {
          const url = `./images/${num}.${suffix}`;
          const testImg = new Image();
          testImg.src = url;
          testImg.onload = () => {
            hasImage = true;
            imgList.push(url);
            createItem(url);
          };
        });

        // 连续探测10个都无图片，判定全部加载完成
        setTimeout(() => {
          if (!hasImage) {
            checkIndex++;
            if (checkIndex > num + 10) {
              loadComplete = true;
              return;
            }
          }
          if (!loadComplete) detectImage(num + 1);
        }, 80);
      }

      // 开始探测图片
      detectImage(1);

      // 日夜模式切换
      const modeBtn = document.getElementById("modeBtn");
      const body = document.body;
      let isDark = true;
      modeBtn.addEventListener("click", () => {
        isDark = !isDark;
        if (isDark) {
          body.classList.remove("light");
          modeBtn.innerHTML = '<i class="fas fa-moon"></i>';
          modeBtn.title = "切换日间模式";
        } else {
          body.classList.add("light");
          modeBtn.innerHTML = '<i class="fas fa-sun"></i>';
          modeBtn.title = "切换夜间模式";
        }
      });

      // 设置按钮
      document.getElementById("settingBtn").addEventListener("click", () => {
        alert(
          "布局规则：根据屏幕宽度自动调整列数\n当前共加载图片：" +
            imgList.length +
            " 张"
        );
      });
    </script>
  </body>
</html>
