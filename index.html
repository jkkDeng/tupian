<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>全自动图片画廊</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #050510;
      --bg-gradient: radial-gradient(circle at 50% 50%, #121230, #050510);
      --grid-bg: #101028;
      --grid-border: #2b2b55;
      --accent-color: #8a6dff;
      --menu-bg: rgba(15, 15, 40, 0.9);
      --text-color: #fff;
      --btn-hover: #6b52e8;
    }

    body.light {
      --bg-main: #f5f7ff;
      --bg-gradient: radial-gradient(circle at 50% 50%, #e8ecff, #f5f7ff);
      --grid-bg: #ffffff;
      --grid-border: #d0d6f0;
      --accent-color: #5c44cc;
      --menu-bg: rgba(255,255,255,0.95);
      --text-color: #222;
      --btn-hover: #4a34b8;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      background-image: var(--bg-gradient);
      transition: 0.4s;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 3px;
      width: 100vw;
      min-height: 100vh;
      padding: 3px;
    }

    /* ========== 核心修复：悬浮层级 ========== */
    .grid-item {
      background: var(--grid-bg);
      border: 1px solid var(--grid-border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.25s ease;
      transform-style: preserve-3d;
      aspect-ratio: 1/1;
      position: relative;
      z-index: 1; /* 默认层级 */
    }

    /* 悬浮时提高层级！永远在最上面 */
    .grid-item:hover {
      z-index: 9999 !important;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: 0.3s;
    }

    .grid-item:hover img {
      opacity: 1;
    }

    .side-menu-wrap {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      z-index: 999999; /* 菜单永远最高 */
    }

    .menu-trigger {
      position: absolute;
      right: 0;
      top: 0;
      width: 12px;
      height: 100vh;
    }

    .side-menu {
      background: var(--menu-bg);
      width: 52px;
      padding: 22px 0;
      border-radius: 6px 0 0 6px;
      transform: translateX(100%);
      transition: 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
    }

    .menu-trigger:hover + .side-menu,
    .side-menu:hover {
      transform: translateX(0);
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-color);
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s;
    }

    .menu-btn:hover {
      background: var(--btn-hover);
      color: #fff;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: #fff;
      font-size: 18px;
      z-index: 99999;
    }
  </style>
</head>
<body>
  <div class="loading">正在加载图片...</div>

  <div class="side-menu-wrap">
    <div class="menu-trigger"></div>
    <div class="side-menu">
      <button class="menu-btn" id="settingBtn"><i class="fas fa-cog"></i></button>
      <button class="menu-btn" id="modeBtn"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div class="grid-container" id="gridBox"></div>

  <script>
    const gridBox = document.getElementById("gridBox");
    const loading = document.querySelector(".loading");
    const imgList = [];

    async function loadImages() {
      try {
        const res = await fetch("./images.json");
        const images = await res.json();

        if (images.length === 0) {
          loading.textContent = "images 文件夹里没有图片";
          return;
        }

        images.forEach(src => {
          const img = new Image();
          img.src = src;
          img.onload = () => {
            createItem(src);
            imgList.push(src);
            loading.style.display = "none";
          }
        });
      } catch (e) {
        loading.textContent = "请先生成图片清单：运行一次 build.js";
      }
    }

    function createItem(src) {
      const item = document.createElement("div");
      item.className = "grid-item";
      const img = document.createElement("img");
      img.src = src;
      img.alt = "图片";
      item.appendChild(img);
      gridBox.appendChild(item);

      item.addEventListener("mousemove", (e) => {
        const rect = item.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const w = rect.width;
        const h = rect.height;

        const rx = (y/h-0.5) * -9;
        const ry = (x/w-0.5) * 9;
        item.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.09) translateZ(-12px)`;
        item.style.boxShadow = `inset -8px -8px 15px rgba(138,109,255,0.4), 0 0 12px var(--accent-color)`;
      });

      item.addEventListener("mouseleave", () => {
        item.style.transform = "rotateX(0) rotateY(0) scale(1) translateZ(0)";
        item.style.boxShadow = "none";
      });
    }

    loadImages();

    const modeBtn = document.getElementById("modeBtn");
    const body = document.body;
    let dark = true;
    modeBtn.onclick = () => {
      dark = !dark;
      body.classList.toggle("light", !dark);
      modeBtn.innerHTML = dark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    };

    settingBtn.onclick = () => alert(`已加载 ${imgList.length} 张图片`);
  </script>
</body>
</html>
