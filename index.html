<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图片画廊</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="loading" class="loading-wrapper">
  <div class="loading-spinner"></div>
  <div>正在加载资源...</div>
</div>

<div id="gridBox" class="grid-container"></div>

<div class="side-menu-wrap">
  <div class="menu-trigger"></div>
  <div class="side-menu">
    <button id="playBtn" class="menu-btn"><i class="fas fa-play"></i></button>
    <button id="nextBtn" class="menu-btn"><i class="fas fa-step-forward"></i></button>
    <button id="modeBtn" class="menu-btn"><i class="fas fa-moon"></i></button>
  </div>
</div>

<script src="./js/main.js"></script>
</body>
</html>
