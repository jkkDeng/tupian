<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的图片画廊</title>
  <!-- 你可以在这里换成你自己的域名标题 -->
  
  <!-- 图标 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #050510;
      --bg-gradient: radial-gradient(circle at 50% 50%, #121230, #050510);
      --grid-bg: #101028;
      --grid-border: #2b2b55;
      --accent-color: #8a6dff;
      --menu-bg: rgba(15, 15, 40, 0.9);
      --text-color: #fff;
      --btn-hover: #6b52e8;
    }

    body.light {
      --bg-main: #f5f7ff;
      --bg-gradient: radial-gradient(circle at 50% 50%, #e8ecff, #f5f7ff);
      --grid-bg: #fff;
      --grid-border: #d0d6f0;
      --accent-color: #5c44cc;
      --menu-bg: rgba(255,255,255,0.95);
      --text-color: #222;
      --btn-hover: #4a34b8;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      background: var(--bg-gradient);
      transition: 0.4s;
    }

    /* 网格布局 */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 4px;
      padding: 4px;
      width: 100vw;
      min-height: 100vh;
    }

    .grid-item {
      position: relative;
      z-index: 1;
      background: var(--grid-bg);
      border: 1px solid var(--grid-border);
      border-radius: 5px;
      overflow: hidden;
      transition: 0.25s ease;
      transform-style: preserve-3d;
      aspect-ratio: 1/1;
    }

    .grid-item:hover {
      z-index: 9999 !important;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: 0.3s;
    }

    .grid-item:hover img {
      opacity: 1;
    }

    /* 右侧菜单 */
    .side-menu-wrap {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      z-index: 999999;
    }

    .menu-trigger {
      position: absolute;
      right: 0;
      top: 0;
      width: 12px;
      height: 100vh;
    }

    .side-menu {
      background: var(--menu-bg);
      width: 52px;
      padding: 22px 0;
      border-radius: 6px 0 0 6px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
    }

    .menu-trigger:hover + .side-menu,
    .side-menu:hover {
      transform: translateX(0);
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-color);
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s;
    }

    .menu-btn:hover {
      background: var(--btn-hover);
      color: #fff;
    }

    /* =================================== */
    /* 🔥  Loading 加载动画（新版）        */
    /* =================================== */
    .loading-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999999;
      color: #fff;
      font-size: 16px;
      gap: 20px;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #2a2a5a;
      border-top-color: #8a6dff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- =================================== -->
  <!-- 🔥  Loading 布局                   -->
  <!-- =================================== -->
  <div class="loading-wrapper" id="loading">
    <div class="loading-spinner"></div>
    <div>正在加载图片，请稍候...</div>
  </div>

  <!-- 菜单 -->
  <div class="side-menu-wrap">
    <div class="menu-trigger"></div>
    <div class="side-menu">
      <button class="menu-btn" id="settingBtn"><i class="fas fa-cog"></i></button>
      <button class="menu-btn" id="modeBtn"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <!-- 图片网格 -->
  <div class="grid-container" id="gridBox"></div>

  <script>
    const grid = document.getElementById('gridBox')
    const loading = document.getElementById('loading')
    let imgCount = 0
    let loadedCount = 0

    // 加载图片清单
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('./images.json')
        const list = await res.json()
        imgCount = list.length

        if (imgCount === 0) {
          loading.querySelector('div:last-child').innerText = "暂无图片"
          return
        }

        list.forEach(src => {
          const img = new Image()
          img.src = src

          img.onload = () => {
            loadedCount++
            createItem(src)
            
            // 全部加载完 → 关闭 loading
            if (loadedCount === imgCount) {
              setTimeout(() => {
                loading.style.opacity = '0'
                setTimeout(() => loading.style.display = 'none', 300)
              }, 400)
            }
          }

          img.onerror = () => {
            loadedCount++
          }
        })

      } catch (e) {
        loading.querySelector('div:last-child').innerText = "加载失败，请刷新"
      }
    })

    // 创建图片项
    function createItem(src) {
      const item = document.createElement('div')
      item.className = 'grid-item'
      const img = document.createElement('img')
      img.src = src
      img.alt = ''
      item.appendChild(img)
      grid.appendChild(item)

      // 3D 效果
      item.addEventListener('mousemove', e => {
        const r = item.getBoundingClientRect()
        const rx = (e.clientY - r.top) / r.height - 0.5
        const ry = (e.clientX - r.left) / r.width - 0.5
        item.style.transform = `rotateX(${rx * -9}deg) rotateY(${ry * 9}deg) scale(1.1)`
        item.style.boxShadow = 'inset -8px -8px 15px rgba(138,109,255,.4), 0 0 12px #8a6dff'
      })

      item.addEventListener('mouseleave', () => {
        item.style.transform = ''
        item.style.boxShadow = ''
      })
    }

    // 日夜模式
    const modeBtn = document.getElementById('modeBtn')
    const body = document.body
    let dark = true
    modeBtn.onclick = () => {
      dark = !dark
      body.classList.toggle('light', !dark)
      modeBtn.innerHTML = dark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>'
    }

    // 设置
    settingBtn.onclick = () => alert(`已加载 ${loadedCount} 张图片`)
  </script>
</body>
</html>
